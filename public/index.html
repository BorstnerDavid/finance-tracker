<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2F5D50">
<title>Ledger — Personal Finance</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══════════ AUTH SCREEN ══════════ -->
<div id="auth-screen" class="auth-screen hidden">
  <div class="auth-card">
    <div class="wordmark">Ledger</div>
    <p class="auth-sub">Your personal finance book</p>
    <form id="auth-form">
      <label class="field">
        <span>Email</span>
        <input type="email" id="auth-email" autocomplete="email" required>
      </label>
      <label class="field">
        <span>Password</span>
        <input type="password" id="auth-password" autocomplete="current-password" minlength="6" required>
      </label>
      <div id="auth-error" class="auth-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-block" id="auth-submit">Sign in</button>
    </form>
    <button class="link-btn auth-forgot" id="auth-forgot">Forgot password?</button>
  </div>
</div>

<!-- ══════════ APP SHELL ══════════ -->
<div id="app" class="app hidden">

  <header class="topbar">
    <div class="wordmark small">Ledger</div>
    <nav class="tabs desktop-tabs" id="tabs-desktop">
      <button class="tab active" data-view="overview">Overview</button>
      <button class="tab" data-view="transactions">Transactions</button>
      <button class="tab" data-view="recurring">Recurring</button>
      <button class="tab" data-view="projects">Projects</button>
      <button class="tab" data-view="household">Household</button>
      <button class="tab" data-view="lending">Lending</button>
      <button class="tab" data-view="investments">Investments</button>
      <button class="tab" data-view="settings">Settings</button>
    </nav>
    <div class="year-picker">
      <button class="icon-btn" id="year-prev" aria-label="Previous year">‹</button>
      <span id="year-label" class="year-label mono">2026</span>
      <button class="icon-btn" id="year-next" aria-label="Next year">›</button>
    </div>
  </header>

  <main id="main" class="main">
    <div id="view-overview" class="view"></div>
    <div id="view-transactions" class="view hidden"></div>
    <div id="view-recurring" class="view hidden"></div>
    <div id="view-projects" class="view hidden"></div>
    <div id="view-household" class="view hidden"></div>
    <div id="view-lending" class="view hidden"></div>
    <div id="view-investments" class="view hidden"></div>
    <div id="view-settings" class="view hidden"></div>
  </main>

  <button class="fab" id="fab" aria-label="Add transaction">+</button>

  <nav class="tabbar" id="tabs-mobile">
    <button class="tabbar-btn active" data-view="overview"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M12 20V4"/><path d="M20 20v-6"/></svg></span>Overview</button>
    <button class="tabbar-btn" data-view="transactions"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h12"/><path d="M8 12h12"/><path d="M8 18h12"/><path d="M4 6h.01"/><path d="M4 12h.01"/><path d="M4 18h.01"/></svg></span>Entries</button>
    <button class="tabbar-btn" data-view="recurring"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11A8 8 0 0 0 6.3 6.3L4 8.6"/><path d="M4 4v4.6h4.6"/><path d="M4 13a8 8 0 0 0 13.7 4.7L20 15.4"/><path d="M20 20v-4.6h-4.6"/></svg></span>Recurring</button>
    <button class="tabbar-btn" data-view="projects"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/></svg></span>Projects</button>
    <button class="tabbar-btn" data-view="household"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9.5"/><path d="M10 21v-6h4v6"/></svg></span>Household</button>
    <button class="tabbar-btn" data-view="lending"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3 3 7l4 4"/><path d="M3 7h13a4 4 0 0 1 4 4v1"/><path d="M17 21l4-4-4-4"/><path d="M21 17H8a4 4 0 0 1-4-4v-1"/></svg></span>Lending</button>
    <button class="tabbar-btn" data-view="investments"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M15 6h6v6"/></svg></span>Invest</button>
    <button class="tabbar-btn" data-view="settings"><span class="tabbar-ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 3v2.4M12 18.6V21M21 12h-2.4M5.4 12H3M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7M18.4 18.4l-1.7-1.7M7.3 7.3 5.6 5.6"/></svg></span>Settings</button>
  </nav>

</div>

<!-- ══════════ TRANSACTION MODAL ══════════ -->
<div id="tx-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="tx-modal-title">Add entry</h2>
      <button class="icon-btn" data-close="tx-modal" aria-label="Close">✕</button>
    </div>
    <form id="tx-form">
      <div class="seg" role="tablist">
        <button type="button" class="seg-btn active" data-txtype="expense">Expense</button>
        <button type="button" class="seg-btn" data-txtype="income">Income</button>
      </div>
      <div class="seg hidden" role="tablist" id="tx-scope-row">
        <button type="button" class="seg-btn active" data-txscope="personal">Personal</button>
        <button type="button" class="seg-btn" data-txscope="household"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9.5"/><path d="M10 21v-6h4v6"/></svg>Household</button>
      </div>
      <p class="hint hidden" id="tx-scope-hint" style="margin:-4px 0 14px"></p>
      <label class="field">
        <span>Amount (€)</span>
        <input type="text" id="tx-amount" inputmode="decimal" autocomplete="off" required>
      </label>
      <label class="field">
        <span>Date</span>
        <input type="date" id="tx-date" required>
      </label>
      <div class="field-row">
        <label class="field">
          <span>Category</span>
          <select id="tx-category" required></select>
        </label>
        <label class="field">
          <span>Subcategory</span>
          <select id="tx-subcategory"></select>
        </label>
      </div>
      <label class="field">
        <span>Note (optional)</span>
        <input type="text" id="tx-note" maxlength="120" placeholder="e.g. Mercator weekly shop">
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger hidden" id="tx-delete">Delete</button>
        <div class="spacer"></div>
        <button type="button" class="btn" data-close="tx-modal">Cancel</button>
        <button type="submit" class="btn btn-primary" id="tx-save">Save entry</button>
      </div>
    </form>
  </div>
</div>

<!-- ══════════ RECURRING MODAL ══════════ -->
<div id="rec-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="rec-modal-title">Add recurring</h2>
      <button class="icon-btn" data-close="rec-modal" aria-label="Close">✕</button>
    </div>
    <form id="rec-form">
      <div class="seg" role="tablist">
        <button type="button" class="seg-btn active" data-rectype="expense">Expense</button>
        <button type="button" class="seg-btn" data-rectype="income">Income</button>
      </div>
      <div class="seg hidden" role="tablist" id="rec-scope-row">
        <button type="button" class="seg-btn active" data-recscope="personal">Personal</button>
        <button type="button" class="seg-btn" data-recscope="household"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9.5"/><path d="M10 21v-6h4v6"/></svg>Household</button>
      </div>
      <p class="hint hidden" id="rec-scope-hint" style="margin:-4px 0 14px"></p>
      <label class="field">
        <span>Name</span>
        <input type="text" id="rec-name" maxlength="60" placeholder="e.g. Rent, Netflix, Gym" required>
      </label>
      <div class="field-row">
        <label class="field">
          <span>Amount (€)</span>
          <input type="text" id="rec-amount" inputmode="decimal" autocomplete="off" required>
        </label>
        <label class="field">
          <span>Day of month</span>
          <input type="number" id="rec-day" min="1" max="31" value="1" required>
        </label>
      </div>
      <div class="field-row">
        <label class="field">
          <span>Category</span>
          <select id="rec-category" required></select>
        </label>
        <label class="field">
          <span>Subcategory</span>
          <select id="rec-subcategory"></select>
        </label>
      </div>
      <div class="field-row">
        <label class="field">
          <span>Starts</span>
          <input type="month" id="rec-start" required>
        </label>
        <label class="field">
          <span>Ends (optional)</span>
          <input type="month" id="rec-end">
        </label>
      </div>
      <p class="hint">Repeats every month on the chosen day, from the start month until the end month (inclusive). Leave “Ends” empty to repeat indefinitely.</p>
      <div id="rec-overrides" class="ovr-list"></div>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger hidden" id="rec-delete">Delete</button>
        <div class="spacer"></div>
        <button type="button" class="btn" data-close="rec-modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save recurring</button>
      </div>
    </form>
  </div>
</div>

<!-- ══════════ RECURRING OVERRIDE MODAL (one month) ══════════ -->
<div id="ovr-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="ovr-title">Adjust this month</h2>
      <button class="icon-btn" data-close="ovr-modal" aria-label="Close">✕</button>
    </div>
    <p class="hint" id="ovr-sub" style="margin:-8px 0 14px"></p>
    <form id="ovr-form">
      <div class="field-row">
        <label class="field">
          <span>Amount for this month (€)</span>
          <input type="text" id="ovr-amount" inputmode="decimal" autocomplete="off" required>
        </label>
        <label class="field">
          <span>Day</span>
          <input type="number" id="ovr-day" min="1" max="31" required>
        </label>
      </div>
      <div class="modal-actions" style="flex-wrap:wrap">
        <button type="button" class="btn btn-danger btn-sm" id="ovr-skip">Skip this month</button>
        <button type="button" class="btn btn-sm hidden" id="ovr-reset">Reset to rule</button>
        <div class="spacer"></div>
        <button type="button" class="btn btn-sm" id="ovr-edit-rule">Edit rule…</button>
        <button type="submit" class="btn btn-primary btn-sm">Save month</button>
      </div>
    </form>
  </div>
</div>

<!-- ══════════ LOAN MODAL (Lending reminder) ══════════ -->
<div id="loan-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="loan-modal-title">New loan</h2>
      <button class="icon-btn" data-close="loan-modal" aria-label="Close">✕</button>
    </div>
    <form id="loan-form">
      <div class="seg" role="tablist">
        <button type="button" class="seg-btn active" data-loandir="lent">I lent money</button>
        <button type="button" class="seg-btn" data-loandir="borrowed">I borrowed money</button>
      </div>
      <label class="field">
        <span>Person</span>
        <input type="text" id="loan-person" maxlength="60" placeholder="e.g. Ana, Marko" required>
      </label>
      <div class="field-row">
        <label class="field">
          <span>Amount (€)</span>
          <input type="text" id="loan-amount" inputmode="decimal" autocomplete="off" required>
        </label>
        <label class="field">
          <span>Date</span>
          <input type="date" id="loan-date" required>
        </label>
      </div>
      <label class="field">
        <span>Due date (optional)</span>
        <input type="date" id="loan-due">
      </label>
      <label class="field">
        <span>Note (optional)</span>
        <input type="text" id="loan-note" maxlength="120" placeholder="e.g. Concert tickets">
      </label>
      <div class="modal-actions" style="flex-wrap:wrap">
        <button type="button" class="btn btn-danger hidden" id="loan-delete">Delete</button>
        <button type="button" class="btn btn-sm hidden" id="loan-settle">Mark settled</button>
        <div class="spacer"></div>
        <button type="button" class="btn" data-close="loan-modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- ══════════ PROJECT MODAL ══════════ -->
<div id="project-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="project-modal-title">New project</h2>
      <button class="icon-btn" data-close="project-modal" aria-label="Close">✕</button>
    </div>
    <form id="project-form">
      <div class="seg hidden" role="tablist" id="project-scope-row">
        <button type="button" class="seg-btn active" data-projscope="personal">Personal</button>
        <button type="button" class="seg-btn" data-projscope="household"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:2px"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10.5V20a1 1 0 0 0 1 1h11a1 1 0 0 0 1-1v-9.5"/><path d="M10 21v-6h4v6"/></svg>Household</button>
      </div>
      <p class="hint hidden" id="project-scope-hint" style="margin:-4px 0 14px"></p>
      <label class="field">
        <span>Name</span>
        <input type="text" id="project-name" maxlength="60" placeholder="e.g. Kitchen remodel, Wedding, New car" required>
      </label>
      <div class="field-row">
        <label class="field">
          <span>Budget (€, optional)</span>
          <input type="text" id="project-budget" inputmode="decimal" autocomplete="off">
        </label>
      </div>
      <label class="field">
        <span>Note (optional)</span>
        <input type="text" id="project-note" maxlength="140">
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger hidden" id="project-delete">Delete</button>
        <div class="spacer"></div>
        <button type="button" class="btn" data-close="project-modal">Cancel</button>
        <button type="submit" class="btn btn-primary" id="project-save">Save project</button>
      </div>
    </form>
  </div>
</div>

<!-- ══════════ PROJECT EXPENSE MODAL ══════════ -->
<div id="pexp-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="pexp-modal-title">Add expense</h2>
      <button class="icon-btn" data-close="pexp-modal" aria-label="Close">✕</button>
    </div>
    <form id="pexp-form">
      <label class="field">
        <span>Amount (€)</span>
        <input type="text" id="pexp-amount" inputmode="decimal" autocomplete="off" required>
      </label>
      <label class="field">
        <span>Date</span>
        <input type="date" id="pexp-date" required>
      </label>
      <label class="field">
        <span>Note (optional)</span>
        <input type="text" id="pexp-note" maxlength="120" placeholder="e.g. Cabinets deposit">
      </label>
      <div class="modal-actions">
        <button type="button" class="btn btn-danger hidden" id="pexp-delete">Delete</button>
        <div class="spacer"></div>
        <button type="button" class="btn" data-close="pexp-modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save expense</button>
      </div>
    </form>
  </div>
</div>

<!-- ══════════ ENTRY DETAILS MODAL (Overview drill-down) ══════════ -->
<div id="details-modal" class="modal-backdrop hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="details-title">Details</h2>
      <button class="icon-btn" data-close="details-modal" aria-label="Close">✕</button>
    </div>
    <div id="details-body"></div>
  </div>
</div>

<!-- ══════════ REVOLUT CSV REVIEW MODAL ══════════ -->
<div id="rev-modal" class="modal-backdrop hidden">
  <div class="modal modal-wide">
    <div class="modal-head">
      <h2>Review Revolut import</h2>
      <button class="icon-btn" data-close="rev-modal" aria-label="Close">✕</button>
    </div>
    <p class="hint" id="rev-summary" style="margin:-8px 0 12px"></p>
    <div id="rev-rows" class="rev-rows"></div>
    <div class="modal-actions">
      <div class="spacer"></div>
      <button type="button" class="btn" data-close="rev-modal">Cancel</button>
      <button type="button" class="btn btn-primary" id="rev-import-btn">Import selected</button>
    </div>
  </div>
</div>

<input type="file" id="file-excel" accept=".xlsx,.xls" class="hidden">
<input type="file" id="file-revolut" accept=".csv" class="hidden">

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
